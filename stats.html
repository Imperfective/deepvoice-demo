<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>설문 통계 대시보드 — 딥보이스 경고 UX</title>
<style>
  :root {
    --primary:#004F59; --primaryLight:#D3E6E8; --ink:#1c1c1c; --sub:#555;
    --muted:#9aa0a0; --bg:#f4f6f6; --card:#fff; --success:#2E9E5B; --error:#D32F2F;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,'Pretendard','Noto Sans KR',sans-serif; background:var(--bg); color:var(--ink); padding:24px 16px 60px; }
  .wrap { max-width:1000px; margin:0 auto; }
  header { margin-bottom:20px; }
  h1 { font-size:24px; font-weight:800; letter-spacing:-0.5px; }
  .sub { color:var(--sub); font-size:14px; margin-top:4px; }
  .toolbar { display:flex; gap:10px; flex-wrap:wrap; margin:16px 0; }
  .btn { background:var(--primary); color:#fff; border:none; border-radius:10px; padding:10px 16px; font-size:14px; font-weight:700; cursor:pointer; text-decoration:none; display:inline-block; }
  .btn.ghost { background:#fff; color:var(--primary); border:1.5px solid var(--primary); }
  .total { font-size:14px; color:var(--sub); display:flex; align-items:center; gap:8px; }
  .total b { font-size:20px; color:var(--primary); }
  .card { background:var(--card); border-radius:14px; padding:18px 20px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
  .card h2 { font-size:16px; font-weight:700; margin-bottom:14px; color:var(--ink); }
  table { width:100%; border-collapse:collapse; font-size:13.5px; }
  th,td { padding:9px 8px; text-align:center; border-bottom:1px solid #eee; }
  th { color:var(--muted); font-weight:600; font-size:12px; }
  td.label { text-align:left; font-weight:600; color:var(--sub); }
  .bar-row { display:flex; align-items:center; gap:10px; margin:7px 0; }
  .bar-label { width:90px; font-size:12.5px; color:var(--sub); flex-shrink:0; text-align:right; }
  .bar-track { flex:1; background:#eef2f1; border-radius:6px; height:22px; position:relative; overflow:hidden; }
  .bar-fill { height:100%; background:var(--primary); border-radius:6px; display:flex; align-items:center; justify-content:flex-end; padding-right:8px; color:#fff; font-size:11.5px; font-weight:700; min-width:26px; transition:width .4s; }
  .pattern-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:12px; }
  .pcard { border:1.5px solid var(--primaryLight); border-radius:12px; padding:14px; }
  .pcard .pname { font-weight:800; font-size:15px; color:var(--primary); margin-bottom:4px; }
  .pcard .pn { font-size:12px; color:var(--muted); margin-bottom:10px; }
  .metric { display:flex; justify-content:space-between; font-size:13px; padding:4px 0; }
  .metric .v { font-weight:700; }
  .metric .v.good { color:var(--success); }
  .empty { text-align:center; color:var(--muted); padding:40px 0; font-size:14px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media(max-width:640px){ .grid2{grid-template-columns:1fr;} }
  .updated { font-size:12px; color:var(--muted); text-align:right; margin-top:8px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📊 설문 통계 대시보드</h1>
    <div class="sub">딥보이스 보이스피싱 경고 UX 연구 · 실시간 집계</div>
  </header>

  <div class="toolbar">
    <span class="total">총 응답 <b id="total">0</b> 건</span>
    <span style="flex:1"></span>
    <button class="btn ghost" onclick="load()">🔄 새로고침</button>
    <a class="btn" href="/api/surveys.csv">⬇ CSV 다운로드</a>
  </div>

  <div id="content"></div>
  <div class="updated" id="updated"></div>
</div>

<script>
const LIKERT_ORDER = ['trust','understand','usability','intrusive','satisfaction','readability','habituation','haptic','confScore'];
const PATTERN_NAME = { A:'A · 단순 텍스트', B:'B · 컬러·아이콘', C:'C · 멀티모달', D:'D · 행동 유도형' };
let LABELS = {};

function barChart(distObj, opts={}) {
  const entries = Object.entries(distObj || {});
  if (!entries.length) return '<div class="empty" style="padding:16px">데이터 없음</div>';
  const max = Math.max(...entries.map(([,v])=>v), 1);
  return entries.map(([k,v]) =>
    `<div class="bar-row"><div class="bar-label">${k}</div>
     <div class="bar-track"><div class="bar-fill" style="width:${Math.max((v/max)*100,8)}%">${v}</div></div></div>`
  ).join('');
}

function patternCards(byPattern) {
  return ['A','B','C','D'].map(p => {
    const d = byPattern[p] || {n:0};
    if (!d.n) {
      return `<div class="pcard"><div class="pname">${PATTERN_NAME[p]}</div><div class="pn">응답 0건</div></div>`;
    }
    const likert = LIKERT_ORDER
      .filter(f => d.likert[f] != null)
      .map(f => `<div class="metric"><span>${LABELS[f]||f}</span><span class="v">${d.likert[f]}</span></div>`)
      .join('');
    return `<div class="pcard">
      <div class="pname">${PATTERN_NAME[p]}</div>
      <div class="pn">응답 ${d.n}건</div>
      <div class="metric"><span>사기 인지율</span><span class="v good">${d.recognitionRate ?? '-'}%</span></div>
      <div class="metric"><span>평균 반응시간</span><span class="v">${d.reactionTimeAvg ?? '-'}초</span></div>
      <div style="border-top:1px dashed #ddd; margin:8px 0 4px; padding-top:6px; font-size:11px; color:#9aa0a0">리커트 평균 (1-5)</div>
      ${likert}
    </div>`;
  }).join('');
}

async function load() {
  const res = await fetch('/api/surveys/stats');
  const { stats, likertLabels } = await res.json();
  LABELS = likertLabels;
  document.getElementById('total').textContent = stats.total;

  if (stats.total === 0) {
    document.getElementById('content').innerHTML = '<div class="card"><div class="empty">아직 수집된 설문이 없습니다.<br>참여자가 설문을 제출하면 이곳에 실시간 집계됩니다.</div></div>';
    document.getElementById('updated').textContent = '';
    return;
  }

  const html = `
    <div class="card">
      <h2>패턴별 핵심 지표</h2>
      <div class="pattern-grid">${patternCards(stats.byPattern)}</div>
    </div>

    <div class="grid2">
      <div class="card">
        <h2>가장 효과적인 경고 (투표)</h2>
        ${barChart(stats.mostEffective)}
      </div>
      <div class="card">
        <h2>가장 거슬린 경고 (투표)</h2>
        ${barChart(stats.mostAnnoying)}
      </div>
    </div>

    <div class="grid2">
      <div class="card"><h2>연령대 분포</h2>${barChart(stats.demographics.age)}</div>
      <div class="card"><h2>성별 분포</h2>${barChart(stats.demographics.gender)}</div>
    </div>

    <div class="grid2">
      <div class="card"><h2>보이스피싱 사전 경험</h2>${barChart(stats.priorVishing)}</div>
      <div class="card"><h2>딥페이크 인지 여부</h2>${barChart(stats.priorDeepfake)}</div>
    </div>

    <div class="grid2">
      <div class="card"><h2>최종 학력</h2>${barChart(stats.demographics.edu)}</div>
      <div class="card"><h2>스마트폰 사용시간</h2>${barChart(stats.demographics.usage)}</div>
    </div>
  `;
  document.getElementById('content').innerHTML = html;
  document.getElementById('updated').textContent = '마지막 갱신: ' + new Date().toLocaleString('ko-KR');
}

load();
setInterval(load, 30000); // 30초마다 자동 갱신
</script>
</body>
</html>
